version: '3.8'

services:
  database:
    image: postgres:15
    container_name: local_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_analyzer_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=resume_db
      - DB_USER=user
      - DB_PASSWORD=password
      - AI_API_KEY=${AI_API_KEY:-your_api_key_here}
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_analyzer_frontend
    ports:
      - "5173:5173"
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
